# Railway config for the NEXUS backend service
# In Railway dashboard → Service → Settings → Source:
#   Set "Root Directory" to "nexus"
# Railway will find this file and use Dockerfile.backend automatically.

[build]
  builder = "DOCKERFILE"

[deploy]
  healthcheckPath = "/"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3
