<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>NEXUS</title>

  <!--
    THREE-LAYER SPEED STRATEGY
    ───────────────────────────────────────────────────────────────────────────

    Layer 1 — DNS + TLS pre-connection (fires in parallel with page parse)
    ────────────────────────────────────────────────────────────────────────
    These hints tell Chrome to resolve DNS and complete the TCP/TLS handshake
    RIGHT NOW, before the redirect even fires. When window.location.replace()
    runs a few milliseconds later, the connection is already open and Chrome
    skips the ~100 ms handshake entirely.
  -->
  <link rel="preconnect" href="https://nexus.lj-buchmiller.com" crossorigin>
  <link rel="dns-prefetch" href="https://nexus.lj-buchmiller.com">

  <!--
    Layer 2 — Speculative prerender (Chrome renders NEXUS in a hidden tab NOW)
    ────────────────────────────────────────────────────────────────────────────
    Chrome's Speculation Rules API tells the browser to fully prerender NEXUS
    in the background as soon as this page loads. When window.location.replace()
    targets the same URL milliseconds later, Chrome ACTIVATES the already-
    rendering page instead of starting a fresh navigation — the result is
    near-instant page activation.

    MV3's default CSP explicitly includes 'inline-speculation-rules', so this
    declarative JSON block is allowed even though other inline scripts are not.
    "eagerness: eager" means Chrome starts immediately, not on hover/click.
  -->
  <script type="speculationrules">
    {
      "prerender": [{
        "source": "list",
        "urls": ["https://nexus.lj-buchmiller.com"],
        "eagerness": "eager"
      }]
    }
  </script>

  <!--
    Layer 3 — Instant JS redirect (single mechanism, no meta-refresh overhead)
    ────────────────────────────────────────────────────────────────────────────
    redirect.js is a blocking script loaded from the extension package (local,
    zero network cost). It executes synchronously and calls window.location.replace()
    before the browser renders a single pixel of this page.

    The old meta http-equiv="refresh" is gone — it added an unnecessary browser
    scheduling cycle on top of the JS redirect that was already firing first.
    One mechanism is strictly faster than two.
  -->
  <script src="redirect.js"></script>

  <!-- Fallback background — matches NEXUS dark theme exactly.
       If a single frame flickers before the redirect, it's invisible. -->
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#0a0a0f}
    @media(prefers-color-scheme:light){html,body{background:#f0f0f8}}
  </style>
</head>
<body></body>
</html>
