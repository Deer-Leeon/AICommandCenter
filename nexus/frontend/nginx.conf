server {
  listen 8080;
  root /usr/share/nginx/html;
  index index.html;

  # Railway (and Cloudflare) set X-Forwarded-Proto to indicate the original
  # protocol. Redirect HTTP→HTTPS at the server level so the PKCE code_verifier
  # is always stored in the same https:// origin as the OAuth callback.
  if ($http_x_forwarded_proto = "http") {
    return 301 https://$host$request_uri;
  }

  # index.html must never be cached — after a redeploy the new chunk hashes
  # won't match a stale index.html, causing the JS-MIME-type white screen.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # Hashed asset bundles are content-addressed — safe to cache forever.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    expires max;
  }

  # API proxy — forward to the backend container on the docker network.
  # Uses a resolver + variable so nginx doesn't try to resolve the hostname
  # at startup (which would fail on Railway where there is no Docker network).
  location /api/ {
    resolver 8.8.8.8 valid=10s ipv6=off;
    set $backend "http://nexus-backend:3001";
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
  }

  # SPA fallback — every unknown path returns index.html.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
