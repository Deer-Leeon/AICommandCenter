server {
  listen 4173;
  root /usr/share/nginx/html;
  index index.html;

  # index.html must never be cached — after a redeploy the new chunk hashes
  # won't match a stale index.html, causing the JS-MIME-type white screen.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # Hashed asset bundles are content-addressed — safe to cache forever.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    expires max;
  }

  # API proxy — forward to the backend container on the docker network.
  location /api/ {
    proxy_pass http://nexus-backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
  }

  # SPA fallback — every unknown path returns index.html.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
